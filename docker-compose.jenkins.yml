version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:2.440.3-jdk17
    container_name: jenkins-server
    privileged: true
    user: root
    ports:
      - "8085:8080" # Jenkins UI
      - "50005:50000" # JNLP port
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Mount host docker socket
    restart: unless-stopped

volumes:
  jenkins_home:
