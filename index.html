<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Live2D Game Dev Portfolio</title>
    <!-- Live2D Runtimes -->
    <script src="/live2dcubismcore.min.js?v=5.0"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Anti-Theft Roadblock: Disables Right-Click and DevTools Shortcuts -->
    <script>
      // Disable Right-Click
      document.addEventListener('contextmenu', event => event.preventDefault());

      // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
      document.addEventListener('keydown', (event) => {
          if (event.keyCode === 123) { // F12
              event.preventDefault();
              return false;
          }
          if (event.ctrlKey && event.shiftKey && event.keyCode === 73) { // Ctrl+Shift+I
              event.preventDefault();
              return false;
          }
          if (event.ctrlKey && event.shiftKey && event.keyCode === 74) { // Ctrl+Shift+J
              event.preventDefault();
              return false;
          }
          if (event.ctrlKey && event.shiftKey && event.keyCode === 67) { // Ctrl+Shift+C
              event.preventDefault();
              return false;
          }
          if (event.ctrlKey && event.keyCode === 85) { // Ctrl+U
              event.preventDefault();
              return false;
          }
      });
    </script>
  </body>
</html>
